<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SolveAI - Статистика</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container py-3">
    <!-- Заголовок -->
    <div class="text-center mb-4">
      <h1 class="h4 fw-bold">📊 SolveAI Статистика</h1>
      <p class="text-muted">Ваш прогресс и достижения</p>
    </div>

    <!-- Карточка пользователя -->
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex align-items-center">
          <div class="avatar me-3" id="userAvatar">👤</div>
          <div>
            <h5 class="mb-1" id="userName">Пользователь</h5>
            <p class="mb-0 text-muted" id="userStatus">Free</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Уровень и XP -->
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="h5 mb-0" id="levelName">🌱 Новичок</span>
          <span class="badge bg-primary" id="levelBadge">Уровень 1</span>
        </div>
        <div class="progress mb-2" style="height: 10px;">
          <div class="progress-bar" id="xpProgress" role="progressbar" style="width: 0%"></div>
        </div>
        <div class="d-flex justify-content-between">
          <small class="text-muted" id="xpCurrent">0 XP</small>
          <small class="text-muted" id="xpNext">100 XP</small>
        </div>
      </div>
    </div>

    <!-- Статистика запросов -->
    <div class="card mb-3">
      <div class="card-body">
        <h6 class="card-title">📈 Активность</h6>
        <canvas id="requestsChart" height="200"></canvas>
      </div>
    </div>

    <!-- Челленджи -->
    <div class="card mb-3">
      <div class="card-body">
        <h6 class="card-title">📅 Челленджи</h6>
        <div id="challengesList">
          <p class="text-muted text-center">Загрузка...</p>
        </div>
      </div>
    </div>

    <!-- Избранное -->
    <div class="card mb-3">
      <div class="card-body">
        <h6 class="card-title">⭐ Избранное</h6>
        <div id="favoritesList">
          <p class="text-muted text-center">Загрузка...</p>
        </div>
      </div>
    </div>

    <!-- Достижения -->
    <div class="card mb-3">
      <div class="card-body">
        <h6 class="card-title">🏆 Достижения</h6>
        <div id="achievementsList" class="d-flex flex-wrap gap-2">
          <p class="text-muted text-center w-100">Загрузка...</p>
        </div>
      </div>
    </div>

    <!-- Кнопка закрыть -->
    <div class="text-center mt-4">
      <button class="btn btn-primary btn-lg" onclick="Telegram.WebApp.close()">
        Закрыть
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
